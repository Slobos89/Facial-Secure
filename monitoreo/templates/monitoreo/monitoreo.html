{% extends 'base.html' %}

{% load static %}

{% block title %}
Monitoreo Biométrico
{% endblock %}

{% block content %}

<div class="content-body">

    <!-- =========================
         MONITOREO LIVE
    ========================== -->

    <section class="scanner-panel panel">

        <div class="panel-header">

            <div class="panel-title">

                Monitoreo Biométrico 24/7

            </div>

            <div class="live">

                🟢 LIVE

            </div>

        </div>

        <div class="camera-container">

            <video
                id="video"
                autoplay
                playsinline
                muted
            ></video>

            <canvas id="canvas-monitor"></canvas>

        </div>
    </section>


    <!-- =========================
         DETECCIONES
    ========================== -->

    <section class="detections-panel panel">

        <div
            class="detections-list"
            id="detections-list"
        >
        </div>

    </section>

</div>

<script>

/* =========================
   VARIABLES GLOBALES
========================= */

const deteccionesRecientes = {};

let estadoActual = 'ESCANEANDO';

let colorActual = '#22c55e';


const video =
    document.getElementById(
        'video'
    );

const canvas =
    document.getElementById(
        'canvas-monitor'
    );

const ctx =
    canvas.getContext('2d');

const detectionsList =
    document.getElementById(
        'detections-list'
    );


/* =========================
   FACE DETECTOR API
========================= */

let detector = null;


if('FaceDetector' in window){

    detector = new FaceDetector({

        fastMode: true,

        maxDetectedFaces: 10

    });

}


/* =========================
   INICIAR CÁMARA
========================= */

navigator.mediaDevices.getUserMedia({

    video: {

        width: 640,
        height: 480

    }

})

.then(stream => {

    video.srcObject = stream;

    console.log(

        stream
        .getVideoTracks()[0]
        .getSettings()

    );

})

.catch(error => {

    console.error(

        'Error cámara:',

        error

    );

});


/* =========================
   VIDEO LISTO
========================= */

video.addEventListener(

    'loadedmetadata',

    () => {

        ajustarCanvas();

        detectarTiempoReal();

        iniciarMonitoreo();

    }

);


/* =========================
   AJUSTAR CANVAS
========================= */

function ajustarCanvas(){

    canvas.width = 640;

    canvas.height = 480;

}


/* =========================
   TRACKING TIEMPO REAL
========================= */

async function detectarTiempoReal(){

    if(video.readyState < 2){

        requestAnimationFrame(
            detectarTiempoReal
        );

        return;

    }


    try{

        if(!detector){

            requestAnimationFrame(
                detectarTiempoReal
            );

            return;

        }


        const faces =
            await detector.detect(video);


        ctx.clearRect(

            0,
            0,

            canvas.width,
            canvas.height

        );


        faces.forEach(face => {

            const box =
                face.boundingBox;


            /* =========================
               RECTÁNGULO
            ========================== */

            ctx.strokeStyle =
                colorActual;

            ctx.lineWidth = 4;


            ctx.strokeRect(

                box.x,
                box.y,

                box.width,
                box.height

            );


            /* =========================
               TEXTO
            ========================== */

            ctx.fillStyle =
                colorActual;

            ctx.font =
                '18px Arial';


            ctx.fillText(

                estadoActual,

                box.x,
                box.y - 10

            );

        });

    }

    catch(error){

        console.error(error);

    }


    requestAnimationFrame(
        detectarTiempoReal
    );

}


/* =========================
   LOOP DJANGO
========================= */

let monitoreoActivo = false;


async function iniciarMonitoreo(){

    if(monitoreoActivo){
        return;
    }

    monitoreoActivo = true;


    while(monitoreoActivo){

        await detectarFrame();

        await esperar(2500);

    }

}


function esperar(ms){

    return new Promise(resolve => {

        setTimeout(resolve, ms);

    });

}


/* =========================
   RECONOCIMIENTO DJANGO
========================= */

async function detectarFrame(){

    if(
        document.hidden ||
        video.readyState < 2
    ){
        return;
    }


    /* =========================
       FRAME REDUCIDO
    ========================== */

    const tempCanvas =
        document.createElement(
            'canvas'
        );

    const tempCtx =
        tempCanvas.getContext(
            '2d'
        );


    tempCanvas.width = 640;

    tempCanvas.height = 480;


    tempCtx.drawImage(

        video,

        0,
        0,

        640,
        480

    );


    const imagen =
        tempCanvas.toDataURL(

            'image/jpeg',

            0.9

        );


    try{

        const response = await fetch(

            '/monitoreo/detectar/',

            {

                method: 'POST',

                headers: {

                    'Content-Type':
                    'application/x-www-form-urlencoded'

                },

                body:

                    'foto_base64=' +

                    encodeURIComponent(
                        imagen
                    )

            }

        );


        const data =
            await response.json();


        data.rostros.forEach(rostro => {

            /* =========================
               COLOR / ESTADO
            ========================== */

            let color =
                '#22c55e';

            let claseCard =
                'card-success';


            if(
                rostro.estado ===
                'REVISION'
            ){

                color =
                    '#eab308';

                claseCard =
                    'card-warning';

            }

            else if(
                rostro.estado ===
                'DENEGADO'
            ){

                color =
                    '#ef4444';

                claseCard =
                    'card-danger';

            }


            estadoActual =
                rostro.estado;

            colorActual =
                color;


            /* =========================
               CONTROL DUPLICADOS
            ========================== */

            const identificador =
                rostro.id;

            const ahora =
                Date.now();


            if(
                deteccionesRecientes[
                    identificador
                ]
            ){

                const diferencia =

                    ahora -

                    deteccionesRecientes[
                        identificador
                    ];


                if(diferencia < 10000){

                    return;

                }

            }


            deteccionesRecientes[
                identificador
            ] = ahora;


            /* =========================
               SNAPSHOT
            ========================== */

            const faceCanvas =
                document.createElement(
                    'canvas'
                );

            const faceCtx =
                faceCanvas.getContext(
                    '2d'
                );


            faceCanvas.width = 300;

            faceCanvas.height = 300;

            const margin = 80;

            faceCtx.drawImage(

                video,

                rostro.x - margin,
                rostro.y - margin,

                rostro.w + (margin*2),
                rostro.h + (margin*2),

                0,
                0,

                300,
                300

            );


            const snapshot =
                faceCanvas.toDataURL(

                    'image/jpeg',

                    0.7

                );


            /* =========================
               CARD
            ========================== */

            const card = `

            <div class="detection-card ${claseCard}">

                <div class="detection-photo">

                    <img
                        src="${snapshot}"
                        alt="rostro"
                    >

                </div>

                <div class="detection-data">

                    <div class="detection-header">

                        <h3>
                            ${rostro.nombre}
                        </h3>

                        <span class="status-badge ${claseCard}">
                            ${rostro.estado}
                        </span>

                    </div>

                    <div class="detection-details">

                        <p>
                            Coincidencia:
                            ${rostro.coincidencia}%
                        </p>

                        <p>
                            Cámara Principal
                        </p>

                        <p>
                            ${new Date().toLocaleTimeString()}
                        </p>

                    </div>

                </div>

            </div>

            `;


            detectionsList.insertAdjacentHTML(

                'afterbegin',

                card

            );


            const cards =

                detectionsList.querySelectorAll(
                    '.detection-card'
                );


            if(cards.length > 15){

                cards[
                    cards.length - 1
                ].remove();

            }

        });

    }

    catch(error){

        console.error(error);

    }

}


/* =========================
   CERRAR
========================= */

window.addEventListener(

    'beforeunload',

    () => {

        monitoreoActivo = false;

    }

);

</script>

{% endblock %}
